<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Blob Storage - Cliente Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        h2 {
            color: #764ba2;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            background: white;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9fa;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .file-label:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-delete {
            background: #dc3545;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-download {
            background: #28a745;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-download:hover {
            background: #218838;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .file-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .file-info {
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .file-date {
            color: #999;
            font-size: 0.85em;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .selected-file {
            margin-top: 15px;
            color: #666;
            font-style: italic;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔷 Azure Blob Storage</h1>
        <p class="subtitle">Container: <strong>nathcontainer</strong></p>

        <div class="section">
            <h2>Upload de Imagem</h2>
            <div class="upload-area">
                <label for="fileInput" class="file-label">Selecionar Arquivo</label>
                <input type="file" id="fileInput" accept="image/*">
                <div class="selected-file" id="selectedFile"></div>
                <br><br>
                <button class="btn" onclick="uploadFile()" id="uploadBtn" disabled>Enviar</button>
            </div>
            <div class="message" id="uploadMessage"></div>
        </div>

        <div class="section">
            <h2>Arquivos no Container</h2>
            <button class="btn" onclick="listFiles()">🔄 Atualizar Lista</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Carregando...</p>
            </div>
            <div class="files-grid" id="filesGrid"></div>
            <div class="message" id="listMessage"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/blobs';

        // Event listener para seleção de arquivo
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const uploadBtn = document.getElementById('uploadBtn');
            const selectedFile = document.getElementById('selectedFile');

            if (file) {
                selectedFile.textContent = `Arquivo selecionado: ${file.name} (${formatFileSize(file.size)})`;
                uploadBtn.disabled = false;
            } else {
                selectedFile.textContent = '';
                uploadBtn.disabled = true;
            }
        });

        // Upload de arquivo
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const uploadBtn = document.getElementById('uploadBtn');
            const message = document.getElementById('uploadMessage');

            if (!file) {
                showMessage(message, 'Por favor, selecione um arquivo.', 'error');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Enviando...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(message, `${data.message} - ${data.fileName}`, 'success');
                    fileInput.value = '';
                    document.getElementById('selectedFile').textContent = '';
                    listFiles();
                } else {
                    showMessage(message, `${data.message}`, 'error');
                }
            } catch (error) {
                showMessage(message, `Erro ao fazer upload: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Enviar';
            }
        }

        // Listar arquivos
        async function listFiles() {
            const filesGrid = document.getElementById('filesGrid');
            const loading = document.getElementById('loading');
            const message = document.getElementById('listMessage');

            loading.style.display = 'block';
            filesGrid.innerHTML = '';
            message.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/list`);

                if (!response.ok) {
                    throw new Error('Erro ao listar arquivos');
                }

                const files = await response.json();

                if (files.length === 0) {
                    filesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">Nenhum arquivo encontrado.</p>';
                } else {
                    files.forEach(file => {
                        const card = createFileCard(file);
                        filesGrid.appendChild(card);
                    });
                }
            } catch (error) {
                showMessage(message, `Erro ao listar arquivos: ${error.message}`, 'error');
            } finally {
                loading.style.display = 'none';
            }
        }

        // Criar card de arquivo
        function createFileCard(file) {
            const card = document.createElement('div');
            card.className = 'file-card';

            const img = document.createElement('img');
            img.src = `${API_URL}/view/${file.name}`;
            img.alt = file.name;
            img.onerror = function() {
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI2VlZSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE4IiBmaWxsPSIjOTk5IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+SW1hZ2VtPC90ZXh0Pjwvc3ZnPg==';
            };

            const info = document.createElement('div');
            info.className = 'file-info';

            const name = document.createElement('div');
            name.className = 'file-name';
            name.textContent = file.name;

            const size = document.createElement('div');
            size.className = 'file-size';
            size.textContent = `Tamanho: ${formatFileSize(file.size)}`;

            const date = document.createElement('div');
            date.className = 'file-date';
            if (file.lastModified) {
                date.textContent = `Modificado: ${new Date(file.lastModified).toLocaleString('pt-BR')}`;
            }

            info.appendChild(name);
            info.appendChild(size);
            info.appendChild(date);

            const actions = document.createElement('div');

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'btn btn-download';
            downloadBtn.textContent = 'Download';
            downloadBtn.onclick = () => downloadFile(file.name);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn btn-delete';
            deleteBtn.textContent = 'Deletar';
            deleteBtn.onclick = () => deleteFile(file.name);

            actions.appendChild(downloadBtn);
            actions.appendChild(deleteBtn);

            card.appendChild(img);
            card.appendChild(info);
            card.appendChild(actions);

            return card;
        }

        // Download de arquivo
        async function downloadFile(fileName) {
            try {
                const response = await fetch(`${API_URL}/download/${fileName}`);

                if (!response.ok) {
                    throw new Error('Erro ao fazer download');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                alert(`Erro ao fazer download: ${error.message}`);
            }
        }

        // Deletar arquivo
        async function deleteFile(fileName) {
            if (!confirm(`Tem certeza que deseja deletar "${fileName}"?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/delete/${fileName}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (response.ok) {
                    alert(`${data.message}`);
                    listFiles();
                } else {
                    alert(`${data.error}`);
                }
            } catch (error) {
                alert(`Erro ao deletar arquivo: ${error.message}`);
            }
        }

        // Formatar tamanho de arquivo
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Mostrar mensagem
        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // Carregar arquivos ao iniciar
        window.onload = () => {
            listFiles();
        };
    </script>
</body>
</html>
